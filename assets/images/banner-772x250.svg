      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="772" height="250" fill="url(#bg)"/>

  <!-- Decorative hexagon -->
  <polygon points="100,50 140,28 180,50 180,94 140,116 100,94" fill="none" stroke="#4f46e5" stroke-width="3" opacity="0.5"/>
